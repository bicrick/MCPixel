<!DOCTYPE html>
<html lang="en" data-theme="forest">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MCPixel</title>
  <link rel="stylesheet" href="/static/css/tokens.css" />
  <link rel="stylesheet" href="/static/css/themes/forest.css" />
  <link rel="stylesheet" href="/static/css/themes/ink.css" />
  <link rel="stylesheet" href="/static/css/base.css" />
  <link rel="stylesheet" href="/static/css/components.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Pixelify+Sans:wght@500;600;700&display=swap" rel="stylesheet" />
  <script>
    (function () {
      var t = localStorage.getItem("mcpixel-theme");
      if (t === "ink" || t === "forest") document.documentElement.dataset.theme = t;
    })();
  </script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-brand">
        <span class="brand">MCPixel</span>
        <span class="topbar-tag">Local pixel suite</span>
      </div>
      <div class="topbar-right">
        <div class="theme-switch" role="group" aria-label="Theme">
          <button type="button" data-theme="forest" class="active">Forest</button>
          <button type="button" data-theme="ink">Ink</button>
        </div>
        <div class="topbar-health" id="healthBar" aria-live="polite">
          <span class="health-dot" id="healthDot" data-state="unknown"></span>
          <span id="healthLabel">Checking…</span>
        </div>
      </div>
    </header>

    <nav class="mobile-tabs" role="tablist" aria-label="Workspace">
      <button type="button" class="mobile-tab active" data-tab="create" role="tab" aria-selected="true">Create</button>
      <button type="button" class="mobile-tab" data-tab="queue" role="tab" aria-selected="false">Queue</button>
      <button type="button" class="mobile-tab" data-tab="job" role="tab" aria-selected="false">Job</button>
    </nav>

    <div class="shell">
      <aside class="rail" id="rail">
        <section class="rail-section create-pane" data-pane="create">
          <h2>Create</h2>
          <label class="prompt-label">
            Prompt
            <textarea id="prompt" rows="4" placeholder="16-color side-view slime, green jelly, cute, game sprite"></textarea>
          </label>
          <div class="size-row">
            <span>Target size (prompt hint)</span>
            <div class="chip-row" id="sizeChips">
              <button type="button" class="size-chip" data-size="16">16</button>
              <button type="button" class="size-chip" data-size="32">32</button>
              <button type="button" class="size-chip" data-size="48">48</button>
              <button type="button" class="size-chip active" data-size="64">64</button>
              <button type="button" class="size-chip" data-size="custom">Custom</button>
              <button type="button" class="size-chip" data-size="none">None</button>
            </div>
            <div class="custom-size" id="customSize" hidden>
              <input id="customW" type="number" min="1" max="1024" placeholder="W" />
              <span>×</span>
              <input id="customH" type="number" min="1" max="1024" placeholder="H" />
            </div>
          </div>
          <div class="k-row">
            <label>
              Colors (k)
              <input id="kColors" type="number" min="2" max="64" value="16" />
            </label>
          </div>
          <div class="actions create-actions">
            <button id="generateBtn" type="button">Generate</button>
            <label class="file-btn">
              Upload
              <input id="upload" type="file" accept="image/png,image/jpeg" hidden />
            </label>
          </div>
          <details class="advanced">
            <summary>Advanced</summary>
            <div class="row">
              <label>
                Pixel size
                <input id="pixelSize" type="number" min="1" step="1" placeholder="auto" />
              </label>
              <label>
                Background
                <select id="bgProvider">
                  <option value="rembg_birefnet">rembg + BiRefNet</option>
                  <option value="skip">Skip</option>
                  <option value="remove_bg">remove.bg API</option>
                </select>
              </label>
            </div>
            <label class="check">
              <input id="wrapPrompt" type="checkbox" checked />
              Wrap with pixel-art style suffix
            </label>
          </details>
          <p id="status" class="status" aria-live="polite"></p>
        </section>

        <section class="rail-section queue-pane" data-pane="queue">
          <div class="queue-head">
            <div class="queue-head-row">
              <h2>Queue</h2>
              <button type="button" id="clearFailedBtn" class="clear-failed-btn" hidden>Clear failed</button>
            </div>
            <div class="queue-filters" role="group" aria-label="Filter jobs">
              <button type="button" class="filter-btn active" data-filter="all">All</button>
              <button type="button" class="filter-btn" data-filter="active">Active</button>
              <button type="button" class="filter-btn" data-filter="done">Done</button>
              <button type="button" class="filter-btn" data-filter="failed">Failed</button>
            </div>
          </div>
          <div id="queue" class="queue-list"></div>
        </section>
      </aside>

      <main class="workspace" id="workspace" data-pane="job">
        <div id="emptyState" class="empty-state">
          <p class="empty-title">No job selected</p>
          <p class="empty-copy">Generate a sprite or pick one from the queue.</p>
        </div>

        <section id="inspect" class="job-view" hidden>
          <div class="job-head">
            <div class="job-head-text">
              <p id="jobPrompt" class="prompt-echo"></p>
              <p class="job-id-line"><code id="jobId"></code></p>
            </div>
            <span id="jobStatus" class="badge"></span>
          </div>

          <ol class="stepper" id="stepper" aria-label="Pipeline progress"></ol>

          <div class="hero-preview">
            <div class="hero-frame" id="heroFrame">
              <p class="meta hero-placeholder">Waiting for output…</p>
            </div>
            <div class="hero-actions">
              <div class="row resnap-row">
                <label>
                  Resnap k
                  <input id="resnapK" type="number" min="2" max="64" value="16" />
                </label>
                <label>
                  Pixel size
                  <input id="resnapPx" type="number" min="1" step="1" placeholder="auto" />
                </label>
              </div>
              <div class="actions">
                <button id="resnapBtn" type="button">Resnap</button>
                <button id="editBtn" type="button" class="secondary">Edit</button>
                <a id="downloadBtn" class="file-btn download-btn" href="#" download hidden>Download</a>
              </div>
              <p id="metaLine" class="meta"></p>
            </div>
          </div>

          <div class="stage-strip" id="stages"></div>
        </section>
      </main>
    </div>
  </div>

  <div id="editorOverlay" class="editor-overlay" hidden>
    <div class="editor-drawer" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
      <div class="editor-head">
        <h2 id="editorTitle">Pixel edit</h2>
        <button type="button" id="closeEditorBtn" class="secondary">Done</button>
      </div>
      <div class="editor-tools">
        <button type="button" data-tool="pencil" class="tool active">Pencil</button>
        <button type="button" data-tool="eraser" class="tool">Eraser</button>
        <button type="button" data-tool="eyedropper" class="tool">Eyedropper</button>
        <button type="button" id="undoBtn" class="secondary">Undo</button>
        <button type="button" id="redoBtn" class="secondary">Redo</button>
        <button type="button" id="saveEditBtn">Save edit</button>
        <input id="color" type="color" value="#1f6f4a" />
      </div>
      <div class="palette" id="palette"></div>
      <div class="canvas-wrap">
        <canvas id="pixelCanvas"></canvas>
      </div>
    </div>
  </div>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
